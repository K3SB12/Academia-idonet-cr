<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma Idoneidad MEP · Academia docente</title>
  <!-- Fuentes, iconos y PDF.js -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid #e2e8f0;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      box-shadow: 4px 0 10px rgba(0,0,0,0.02);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3c5c;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo i {
      color: #3b82f6;
      font-size: 1.8rem;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      color: #334155;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
      color: #64748b;
    }

    .nav-item:hover {
      background: #f1f5f9;
      color: #1e3c5c;
    }

    .nav-item.active {
      background: #e8f0fe;
      color: #1e3c5c;
      font-weight: 600;
    }

    .nav-item.active i {
      color: #3b82f6;
    }

    .user-progress {
      margin-top: auto;
      background: #f1f5f9;
      border-radius: 20px;
      padding: 1.2rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 0.5rem;
    }

    .progress-bar-bg {
      height: 8px;
      background: #cbd5e1;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      border-radius: 10px;
    }

    /* Main content */
    .content {
      flex: 1;
      padding: 2rem 2.5rem;
      overflow-y: auto;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.25rem;
    }

    .section-subtitle {
      color: #64748b;
      margin-bottom: 2rem;
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
      border: 1px solid #eef2f6;
      transition: transform 0.1s ease;
    }

    .card:hover {
      border-color: #b9d4f0;
    }

    .stat-card {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      background: #e6f0ff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b82f6;
      font-size: 1.5rem;
    }

    .stat-content h3 {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-content p {
      color: #64748b;
      font-size: 0.9rem;
    }

    /* Botones */
    .btn {
      background: white;
      border: 1px solid #cbd5e1;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: #1e3c5c;
      border: none;
      color: white;
      box-shadow: 0 4px 8px rgba(30,60,92,0.2);
    }

    .btn-primary:hover {
      background: #143049;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
    }

    .btn-outline:hover {
      background: #f1f5f9;
    }

    /* Upload area */
    .upload-box {
      border: 2px dashed #cbd5e1;
      border-radius: 28px;
      padding: 2.5rem 2rem;
      text-align: center;
      background: #fafdff;
      margin-bottom: 2rem;
      cursor: pointer;
    }

    .upload-box i {
      font-size: 2.5rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .upload-box p {
      color: #475569;
    }

    /* Biblioteca lista */
    .reading-item {
      background: white;
      border-radius: 18px;
      padding: 1rem 1.5rem;
      border: 1px solid #eef2f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .reading-info i {
      margin-right: 0.8rem;
      color: #3b82f6;
    }

    .tag {
      background: #e2f0fa;
      padding: 0.25rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #1e4a7a;
    }

    /* PDF viewer */
    .pdf-container {
      background: #d9e2ef;
      border-radius: 24px;
      padding: 1rem;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pdf-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    canvas {
      max-width: 100%;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    /* Simulador */
    .exam-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 1rem 2rem;
      border-radius: 60px;
      border: 1px solid #e2e8f0;
      margin-bottom: 2rem;
    }

    .timer {
      font-weight: 700;
      font-size: 1.3rem;
      background: #f1f5f9;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
    }

    .question-panel {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    .question-box {
      background: white;
      border-radius: 28px;
      padding: 2rem;
      border: 1px solid #eef2f6;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .option-item {
      background: #f8fafc;
      border-radius: 40px;
      padding: 1rem 1.5rem;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: 0.1s;
    }

    .option-item.selected {
      background: #dbeafe;
      border-color: #3b82f6;
    }

    .question-nav-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .q-nav-btn {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 30px;
      padding: 0.6rem;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
    }

    .q-nav-btn.marked {
      background: #fef9c3;
      border-color: #eab308;
    }

    .q-nav-btn.answered {
      background: #dbeafe;
      border-color: #3b82f6;
    }

    .result-card {
      background: white;
      border-radius: 32px;
      padding: 2.5rem;
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .score-big {
      font-size: 4rem;
      font-weight: 800;
      color: #1e3c5c;
    }

    .hide { display: none !important; }
  </style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="logo"><i class="fas fa-graduation-cap"></i> Idoneidad MEP</div>
    <div class="nav-links">
      <div class="nav-item active" data-view="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
      <div class="nav-item" data-view="library"><i class="fas fa-book-open"></i> Biblioteca</div>
      <div class="nav-item" data-view="modules"><i class="fas fa-cubes"></i> Módulos</div>
      <div class="nav-item" data-view="simulator"><i class="fas fa-pencil-alt"></i> Simulador</div>
    </div>
    <div class="user-progress">
      <div class="progress-label"><span>Progreso general</span> <span id="progress-percent">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div style="margin-top: 1rem; font-size:0.9rem; color:#334155;"><i class="fas fa-check-circle" style="color:#22c55e;"></i> <span id="progress-stats">0 lecturas</span></div>
    </div>
  </nav>

  <!-- CONTENEDOR PRINCIPAL -->
  <main class="content" id="main-content">
    <!-- el contenido se renderiza dinámicamente -->
  </main>
</div>

<script>
  (function() {
    // --------------------------------------------------------------
    // CONFIGURACIÓN PDF.JS
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // --------------------------------------------------------------
    // BASE DE DATOS INDEXEDDB (PERSISTENCIA REAL)
    const DB_NAME = 'IdoneidadDB';
    const DB_VERSION = 2;
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          db = request.result;
          resolve(db);
        };
        request.onupgradeneeded = (ev) => {
          const db = ev.target.result;
          if (!db.objectStoreNames.contains('lecturas')) {
            const store = db.createObjectStore('lecturas', { keyPath: 'id', autoIncrement: true });
            store.createIndex('nombre', 'nombre', { unique: false });
          }
          if (!db.objectStoreNames.contains('pdfs')) {
            db.createObjectStore('pdfs', { keyPath: 'id' }); // blob suelto
          }
          if (!db.objectStoreNames.contains('preguntas')) {
            const storeP = db.createObjectStore('preguntas', { keyPath: 'id', autoIncrement: true });
            storeP.createIndex('lecturaId', 'lecturaId', { unique: false });
          }
          if (!db.objectStoreNames.contains('simulaciones')) {
            db.createObjectStore('simulaciones', { keyPath: 'id', autoIncrement: true });
          }
        };
      });
    }

    // --------------------------------------------------------------
    // ESTADO GLOBAL Y UTILIDADES
    let currentView = 'dashboard';
    let currentReadingId = null;          // para vista de detalle
    let currentPDFDoc = null;             // para el visor
    let currentPage = 1;
    let examState = null;                 // para simulador activo

    // --------------------------------------------------------------
    // RENDERIZADO DINÁMICO
    const contentDiv = document.getElementById('main-content');

    function setActiveNav(view) {
      document.querySelectorAll('.nav-item').forEach(el => {
        const v = el.dataset.view;
        if (v === view) el.classList.add('active');
        else el.classList.remove('active');
      });
    }

    async function navigate(view, param = null) {
      currentView = view;
      setActiveNav(view);
      if (view === 'dashboard') await renderDashboard();
      else if (view === 'library') { currentReadingId = null; await renderLibrary(); }
      else if (view === 'modules') await renderModules();
      else if (view === 'simulator') await renderSimulatorLobby();
    }

    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => navigate(el.dataset.view));
    });

    // --------------------------------------------------------------
    // DASHBOARD
    async function renderDashboard() {
      await openDB(); // asegurar db
      const lecturas = await getAllLecturas();
      const preguntas = await getAllPreguntas();
      const simulaciones = await getAllSimulaciones();
      const totalLecturas = lecturas.length;
      const totalPreguntas = preguntas.length;
      const simulacionesHechas = simulaciones.length;
      const progreso = totalLecturas > 0 ? Math.min(100, Math.round((totalLecturas / 8) * 100)) : 0;
      document.getElementById('progress-fill').style.width = progreso+'%';
      document.getElementById('progress-percent').innerText = progreso+'%';
      document.getElementById('progress-stats').innerText = totalLecturas+' lecturas · '+totalPreguntas+' preguntas';

      contentDiv.innerHTML = `
        <h1 class="section-title">Dashboard</h1>
        <p class="section-subtitle">Bienvenido, docente. Sigue tu preparación.</p>
        <div class="card-grid">
          <div class="card stat-card">
            <div class="stat-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="stat-content"><h3>${totalLecturas}</h3><p>Documentos subidos</p></div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon"><i class="fas fa-question-circle"></i></div>
            <div class="stat-content"><h3>${totalPreguntas}</h3><p>Preguntas generadas</p></div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-content"><h3>${simulacionesHechas}</h3><p>Simulacros realizados</p></div>
          </div>
        </div>
        <h2 style="margin: 2rem 0 1rem;">Módulos recomendados</h2>
        <div class="card-grid">
          <div class="card"><i class="fas fa-balance-scale" style="color:#2563eb;"></i> <strong>Política educativa</strong><br> <span class="tag">3 lecturas</span></div>
          <div class="card"><i class="fas fa-chart-line" style="color:#2563eb;"></i> <strong>Evaluación</strong><br> <span class="tag">2 lecturas</span></div>
          <div class="card"><i class="fas fa-users" style="color:#2563eb;"></i> <strong>Liderazgo pedagógico</strong><br> <span class="tag">1 lectura</span></div>
        </div>
      `;
    }

    // --------------------------------------------------------------
    // BIBLIOTECA Y SUBIDA
    async function renderLibrary() {
      const lecturas = await getAllLecturas();
      let listaHtml = lecturas.map(l => `
        <div class="reading-item" data-id="${l.id}">
          <div class="reading-info"><i class="fas fa-file-pdf"></i> ${l.nombre} <span class="tag">${l.keywords ? l.keywords.slice(0,2).join(', ') : 'sin análisis'}</span></div>
          <div><button class="btn btn-outline ver-pdf-btn" data-id="${l.id}"><i class="fas fa-eye"></i> Ver</button></div>
        </div>
      `).join('');

      contentDiv.innerHTML = `
        <h1 class="section-title">Biblioteca de lecturas</h1>
        <div class="upload-box" id="upload-trigger">
          <i class="fas fa-cloud-upload-alt"></i>
          <p><strong>Haz clic para subir un PDF</strong> o arrastra aquí</p>
          <input type="file" id="pdf-upload" accept=".pdf" style="display: none;" />
        </div>
        <div id="lectura-list">
          ${listaHtml || '<p style="color:#94a3b8;">Todavía no hay documentos. Sube tu primer PDF.</p>'}
        </div>
        <div id="detalle-lectura" style="margin-top: 2rem;"></div>
      `;

      document.getElementById('upload-trigger').addEventListener('click', () => {
        document.getElementById('pdf-upload').click();
      });
      document.getElementById('pdf-upload').addEventListener('change', handlePDFUpload);

      document.querySelectorAll('.ver-pdf-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = Number(btn.dataset.id);
          await verDetalleLectura(id);
        });
      });
      if (currentReadingId) await verDetalleLectura(currentReadingId);
    }

    async function handlePDFUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const strings = content.items.map(item => item.str);
        fullText += strings.join(' ') + '\n';
      }
      // análisis simple de palabras clave (frecuencia)
      const words = fullText.toLowerCase().split(/\W+/).filter(w => w.length > 4);
      const stopwords = ['para','este','sobre','como','con','entre','puede','tiene','parte','tambien','desde','hasta'];
      const freq = {};
      words.forEach(w => { if (!stopwords.includes(w)) freq[w] = (freq[w]||0)+1; });
      const keywords = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);
      const summary = fullText.substring(0, 280) + '…';

      // guardar en IndexedDB
      const lecturaId = await saveLectura({ nombre: file.name, text: fullText, summary, keywords });
      // guardar blob por separado para visor
      const tx = db.transaction('pdfs', 'readwrite');
      tx.objectStore('pdfs').put({ id: lecturaId, blob: arrayBuffer });
      await tx.done;

      // generar preguntas automáticas basadas en keywords (3 por lectura)
      const preguntas = [];
      for (let kw of keywords.slice(0,5)) {
        const opciones = [kw, ...keywords.filter(k => k!==kw).slice(0,3)];
        // mezclar
        for (let i = opciones.length-1; i>0; i--) {
          const j = Math.floor(Math.random()*(i+1));
          [opciones[i], opciones[j]] = [opciones[j], opciones[i]];
        }
        preguntas.push({
          lecturaId,
          texto: `¿Cuál de los siguientes conceptos es clave en el documento "${file.name}"?`,
          opciones: [...opciones],
          correcta: kw
        });
      }
      for (let p of preguntas) {
        await savePregunta(p);
      }

      currentReadingId = lecturaId;
      await renderLibrary(); // recarga con detalle
    }

    async function verDetalleLectura(id) {
      currentReadingId = id;
      const lecturas = await getAllLecturas();
      const lectura = lecturas.find(l => l.id === id);
      if (!lectura) return;
      const preguntas = await getPreguntasByLectura(id);
      const pregHtml = preguntas.map(p => `<li><i class="fas fa-check-circle" style="color:#3b82f6;"></i> ${p.texto}</li>`).join('');

      contentDiv.innerHTML += `
        <div class="card" style="margin-top:1rem;">
          <h2><i class="fas fa-file-pdf"></i> ${lectura.nombre}</h2>
          <p><strong>Resumen:</strong> ${lectura.summary}</p>
          <p><strong>Conceptos clave:</strong> ${lectura.keywords.join(', ')}</p>
          <div><strong>Preguntas generadas (${preguntas.length})</strong><ul>${pregHtml}</ul></div>
          <button class="btn btn-primary" id="view-pdf-btn"><i class="fas fa-eye"></i> Ver PDF completo</button>
          <div id="pdf-viewer-area" class="hide">
            <div class="pdf-container" id="pdf-container"></div>
          </div>
        </div>
      `;
      document.getElementById('view-pdf-btn').addEventListener('click', async () => {
        const area = document.getElementById('pdf-viewer-area');
        area.classList.toggle('hide');
        if (!area.classList.contains('hide') && !currentPDFDoc) {
          await renderPDF(id);
        }
      });
    }

    async function renderPDF(lecturaId) {
      const container = document.getElementById('pdf-container');
      container.innerHTML = '<div class="pdf-controls"><button class="btn btn-outline" id="prev-page"><i class="fas fa-chevron-left"></i></button><span id="page-num">1</span><button class="btn btn-outline" id="next-page"><i class="fas fa-chevron-right"></i></button></div><canvas id="pdf-canvas"></canvas>';
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');
      const tx = db.transaction('pdfs', 'readonly');
      const store = tx.objectStore('pdfs');
      const req = await store.get(lecturaId);
      if (!req) return;
      const arrayBuffer = req.blob;
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      currentPDFDoc = pdf;
      currentPage = 1;
      async function renderPage(num) {
        const page = await pdf.getPage(num);
        const viewport = page.getViewport({ scale: 1.2 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport }).promise;
        document.getElementById('page-num').innerText = num;
      }
      await renderPage(1);
      document.getElementById('prev-page').addEventListener('click', async () => {
        if (currentPage > 1) { currentPage--; await renderPage(currentPage); }
      });
      document.getElementById('next-page').addEventListener('click', async () => {
        if (currentPage < pdf.numPages) { currentPage++; await renderPage(currentPage); }
      });
    }

    // --------------------------------------------------------------
    // MÓDULOS (estáticos + lecturas)
    async function renderModules() {
      const lecturas = await getAllLecturas();
      contentDiv.innerHTML = `
        <h1 class="section-title">Módulos de aprendizaje</h1>
        <div class="card-grid">
          <div class="card"><h3>📘 Política educativa</h3> <p>${lecturas.length} documentos</p> <span class="tag">Ley 2160</span></div>
          <div class="card"><h3>📊 Transformación curricular</h3> <p>${lecturas.length} documentos</p></div>
          <div class="card"><h3>📝 Evaluación</h3> <p>${lecturas.length} documentos</p></div>
          <div class="card"><h3>🏫 Gestión educativa</h3> <p>${lecturas.length} documentos</p></div>
          <div class="card"><h3>🧠 Competencias docentes</h3> <p>${lecturas.length} documentos</p></div>
          <div class="card"><h3>💡 Innovación</h3> <p>${lecturas.length} documentos</p></div>
        </div>
        <h3>Videos de apoyo</h3>
        <iframe width="280" height="160" src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=GJ3bG6Z7kKz0Z5eX" title="YouTube" frameborder="0"></iframe>
      `;
    }

    // --------------------------------------------------------------
    // SIMULADOR
    async function renderSimulatorLobby() {
      const preguntas = await getAllPreguntas();
      if (preguntas.length === 0) {
        contentDiv.innerHTML = `<h1>Simulador</h1><p>Sube documentos y genera preguntas primero.</p>`;
        return;
      }
      contentDiv.innerHTML = `
        <h1 class="section-title">Simulador de examen</h1>
        <div class="card" style="max-width:600px; margin:2rem auto; text-align:center;">
          <p>🔹 <strong>60 preguntas · 70% para aprobar</strong></p>
          <p>Disponibles: ${preguntas.length} preguntas en banco</p>
          <button class="btn btn-primary" id="start-exam"><i class="fas fa-play"></i> Iniciar nuevo simulacro</button>
        </div>
      `;
      document.getElementById('start-exam').addEventListener('click', () => iniciarSimulacro());
    }

    async function iniciarSimulacro() {
      const todas = await getAllPreguntas();
      const seleccionadas = todas.sort(()=>0.5-Math.random()).slice(0, Math.min(60, todas.length));
      if (seleccionadas.length < 10) { alert('Se necesitan al menos 10 preguntas.'); return; }
      examState = {
        preguntas: seleccionadas.map((p,idx) => ({ ...p, idx, respuestaUsuario: null, marcada: false })),
        tiempo: 3600, // 60 min
        index: 0,
        terminado: false,
        respuestas: new Array(seleccionadas.length).fill(null)
      };
      renderSimuladorPregunta();
      iniciarTimer();
    }

    function renderSimuladorPregunta() {
      if (!examState || examState.terminado) return;
      const q = examState.preguntas[examState.index];
      const total = examState.preguntas.length;
      const marcadaClass = q.marcada ? 'marked' : '';
      const opcionesHtml = q.opciones.map((opt, i) => {
        const selected = (examState.respuestas[examState.index] === opt) ? 'selected' : '';
        return `<div class="option-item ${selected}" data-opt="${opt}">${String.fromCharCode(65+i)}. ${opt}</div>`;
      }).join('');
      let navBtns = '';
      for (let i=0; i<total; i++) {
        let cls = 'q-nav-btn';
        if (examState.preguntas[i].marcada) cls += ' marked';
        else if (examState.respuestas[i] !== null) cls += ' answered';
        navBtns += `<div class="${cls}" data-index="${i}">${i+1}</div>`;
      }
      contentDiv.innerHTML = `
        <div class="exam-header">
          <span><i class="fas fa-question-circle"></i> Pregunta ${examState.index+1} de ${total}</span>
          <span class="timer" id="timer">01:00:00</span>
          <button class="btn btn-outline" id="marcar-btn"><i class="fas fa-flag"></i> ${q.marcada ? 'Marcada' : 'Marcar para revisar'}</button>
        </div>
        <div class="question-panel">
          <div class="question-box">
            <h3>${q.texto}</h3>
            <div class="options-grid" id="options-container">${opcionesHtml}</div>
            <div style="display: flex; gap:1rem; margin-top:2rem;">
              <button class="btn btn-outline" id="prev-q" ${examState.index===0?'disabled':''}><i class="fas fa-arrow-left"></i> Anterior</button>
              <button class="btn btn-outline" id="next-q" ${examState.index===total-1?'disabled':''}>Siguiente <i class="fas fa-arrow-right"></i></button>
              ${examState.index===total-1 ? '<button class="btn btn-primary" id="finalizar-btn">Finalizar</button>' : ''}
            </div>
          </div>
          <div class="question-box">
            <strong>Panel de preguntas</strong>
            <div class="question-nav-grid" id="nav-grid">${navBtns}</div>
          </div>
        </div>
      `;

      document.querySelectorAll('.option-item').forEach(el => {
        el.addEventListener('click', () => {
          const opt = el.dataset.opt;
          examState.respuestas[examState.index] = opt;
          renderSimuladorPregunta();
        });
      });
      document.getElementById('marcar-btn')?.addEventListener('click', ()=>{
        examState.preguntas[examState.index].marcada = !examState.preguntas[examState.index].marcada;
        renderSimuladorPregunta();
      });
      document.getElementById('prev-q')?.addEventListener('click', ()=>{
        if (examState.index > 0) { examState.index--; renderSimuladorPregunta(); }
      });
      document.getElementById('next-q')?.addEventListener('click', ()=>{
        if (examState.index < total-1) { examState.index++; renderSimuladorPregunta(); }
      });
      document.querySelectorAll('.q-nav-btn').forEach(b => {
        b.addEventListener('click', (e)=>{
          const idx = parseInt(e.target.dataset.index);
          if (!isNaN(idx)) { examState.index = idx; renderSimuladorPregunta(); }
        });
      });
      if (document.getElementById('finalizar-btn')) {
        document.getElementById('finalizar-btn').addEventListener('click', finalizarSimulacro);
      }
    }

    function iniciarTimer() {
      const timerDiv = document.getElementById('timer');
      if (!timerDiv) return;
      const interval = setInterval(() => {
        if (!examState || examState.terminado) { clearInterval(interval); return; }
        examState.tiempo--;
        const h = Math.floor(examState.tiempo/3600);
        const m = Math.floor((examState.tiempo%3600)/60);
        const s = examState.tiempo%60;
        timerDiv.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (examState.tiempo <= 0) finalizarSimulacro();
      }, 1000);
    }

    function finalizarSimulacro() {
      examState.terminado = true;
      let correctas = 0;
      examState.preguntas.forEach((p, i) => {
        if (examState.respuestas[i] === p.correcta) correctas++;
      });
      const porcentaje = Math.round((correctas / examState.preguntas.length)*100);
      const aprobado = porcentaje >= 70;
      contentDiv.innerHTML = `
        <div class="result-card">
          <i class="fas ${aprobado ? 'fa-check-circle' : 'fa-times-circle'}" style="font-size:4rem; color:${aprobado?'#22c55e':'#ef4444'}"></i>
          <div class="score-big">${porcentaje}%</div>
          <p>${correctas} aciertos de ${examState.preguntas.length}</p>
          <p>${aprobado ? '¡Aprobado! 🎉' : 'Necesitas seguir practicando'}</p>
          <button class="btn btn-primary" onclick="navigate('simulator')">Volver al lobby</button>
        </div>
      `;
      // guardar resultado
      saveSimulacion({ fecha: new Date(), puntaje: porcentaje, correctas, total: examState.preguntas.length });
    }

    // --------------------------------------------------------------
    // OPERACIONES DB
    async function getAllLecturas() {
      if (!db) await openDB();
      const tx = db.transaction('lecturas', 'readonly');
      const store = tx.objectStore('lecturas');
      return await store.getAll();
    }
    async function saveLectura(lectura) {
      const tx = db.transaction('lecturas', 'readwrite');
      const id = await tx.objectStore('lecturas').add(lectura);
      await tx.done;
      return id;
    }
    async function savePregunta(p) {
      const tx = db.transaction('preguntas', 'readwrite');
      await tx.objectStore('preguntas').add(p);
      await tx.done;
    }
    async function getAllPreguntas() {
      if (!db) await openDB();
      const tx = db.transaction('preguntas', 'readonly');
      return await tx.objectStore('preguntas').getAll();
    }
    async function getPreguntasByLectura(lecturaId) {
      const tx = db.transaction('preguntas', 'readonly');
      const index = tx.objectStore('preguntas').index('lecturaId');
      return await index.getAll(lecturaId);
    }
    async function getAllSimulaciones() {
      if (!db) await openDB();
      const tx = db.transaction('simulaciones', 'readonly');
      return await tx.objectStore('simulaciones').getAll();
    }
    async function saveSimulacion(s) {
      const tx = db.transaction('simulaciones', 'readwrite');
      await tx.objectStore('simulaciones').add(s);
      await tx.done;
    }

    // --------------------------------------------------------------
    // INICIO
    window.addEventListener('load', async () => {
      await openDB();
      navigate('dashboard');
    });
    window.navigate = navigate;
  })();
</script>
</body>
</html>

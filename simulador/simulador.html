<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen · Academia MEP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .simulador-container {
            display: flex;
            gap: 2rem;
        }
        .simulador-main {
            flex: 2;
        }
        .simulador-sidebar {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }
        .nav-numero {
            aspect-ratio: 1;
            border: 1px solid #E5E7EB;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-numero.respondida {
            background: #10B981;
            color: white;
            border-color: #10B981;
        }
        .nav-numero.marcada {
            background: #FEF3C7;
            color: #D97706;
            border-color: #D97706;
        }
        .nav-numero.actual {
            border: 3px solid #2563EB;
        }
        .btn-nav {
            padding: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-nav.prev {
            background: #F3F4F6;
        }
        .btn-nav.next {
            background: #2563EB;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-graduation-cap logo-icon"></i>
                <span class="logo-text">Academia MEP</span>
            </div>
            <nav class="sidebar-nav">
                <a href="../index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="#" onclick="window.cargarModulos(); return false;" class="nav-item">
                    <i class="fas fa-book-open"></i>
                    <span>Módulos</span>
                </a>
                <a href="#" onclick="window.cargarBiblioteca(); return false;" class="nav-item">
                    <i class="fas fa-library"></i>
                    <span>Biblioteca</span>
                </a>
                <a href="#" onclick="window.cargarSimulador(); return false;" class="nav-item active">
                    <i class="fas fa-pencil-alt"></i>
                    <span>Simulador</span>
                </a>
                <a href="#" onclick="window.mostrarProgreso(); return false;" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Mi Progreso</span>
                </a>
            </nav>
        </aside>

        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>

        <main class="main-content">
            <div class="simulador-container" id="simulador-container">
                <!-- Se carga dinámicamente -->
                <div style="text-align: center; padding: 3rem; width: 100%;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #2563EB;"></i>
                    <p>Cargando simulador...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/simulador.js"></script>
    <script>
        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        });
        
        // Inicializar simulador al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            if (window.inicializarSimulador) {
                window.inicializarSimulador();
            }
        });
    </script>
</body>
</html>
